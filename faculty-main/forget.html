<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="forget.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Forgot Password</h2>

        <p class="subtitle">
            Recover your account securely
        </p>

        <!-- ================= EMAIL SECTION ================= -->

        <div class="section">

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter registered email">

                <small class="error" id="emailError"></small>

            </div>

            <button id="generateOTP">
                Generate OTP
            </button>

            <!-- OTP DISPLAY (Only for Demo) -->

            <div id="otpDisplay" class="otp-display">

                <span>Generated OTP</span>

                <h3 id="generatedOTP"></h3>

            </div>

        </div>

        <!-- ================= OTP SECTION ================= -->

        <div class="section" id="otpSection" style="display:none;">

            <div class="form-group">

                <label>Enter OTP</label>

                <input
                    type="text"
                    id="otp"
                    maxlength="6"
                    placeholder="Enter OTP">

                <small class="error" id="otpError"></small>

            </div>

            <button id="verifyOTP">
                Verify OTP
            </button>

        </div>

        <!-- ================= PASSWORD SECTION ================= -->

        <div class="section" id="passwordSection" style="display:none;">

            <div class="form-group">

                <label>New Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter New Password">

                    <i class="fa-solid fa-eye toggle"
                        onclick="togglePassword('newPassword',this)">
                    </i>

                </div>

                <small class="error" id="passwordError"></small>

            </div>

            <div class="form-group">

                <label>Confirm Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password">

                    <i class="fa-solid fa-eye toggle"
                        onclick="togglePassword('confirmPassword',this)">
                    </i>

                </div>

                <small class="error" id="confirmError"></small>

            </div>

            <button id="savePassword">
                Save Password
            </button>

        </div>

        <!-- ================= SUCCESS ================= -->

        <div class="section success" id="successSection" style="display:none;">

            <i class="fa-solid fa-circle-check success-icon"></i>

            <h2>Password Updated</h2>

            <p>
                Your password has been updated successfully.
            </p>

            <a href="login1.html">

                <button class="loginBtn">
                    Back To Login
                </button>

            </a>

        </div>

    </div>

</div>

<script src="forget.js"></script>

</body>

</html>
